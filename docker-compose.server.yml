services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jojomusic}
      POSTGRES_USER: ${POSTGRES_USER:-jojomusic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jojomusic}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jojomusic} -d ${POSTGRES_DB:-jojomusic}"]
      interval: 5s
      timeout: 5s
      retries: 20

  resolver-api:
    build:
      context: ./services/resolver_api
    environment:
      RESOLVER_TIMEOUT_SECONDS: ${RESOLVER_TIMEOUT_SECONDS:-25}

  core-api:
    build:
      context: ./services/core_api
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-jojomusic}:${POSTGRES_PASSWORD:-jojomusic}@postgres:5432/${POSTGRES_DB:-jojomusic}
      JWT_SECRET: ${JWT_SECRET}
      RESOLVER_API_URL: http://resolver-api:8000
      LASTFM_API_KEY: ${LASTFM_API_KEY:-}
      LASTFM_SHARED_SECRET: ${LASTFM_SHARED_SECRET:-}
      LRCLIB_BASE_URL: ${LRCLIB_BASE_URL:-https://lrclib.net}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-}
      GENIUS_ACCESS_TOKEN: ${GENIUS_ACCESS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      resolver-api:
        condition: service_started
    ports:
      - "${PUBLIC_API_BIND:-127.0.0.1}:${PUBLIC_API_PORT:-18000}:8000"

volumes:
  postgres_data:
